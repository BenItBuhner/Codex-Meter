name: Build Codex Meter iOS

on:
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios:
    name: Core tests + iPhone Simulator build
    runs-on: macos-26
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ios
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode_26.0.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          elif [[ -d /Applications/Xcode.app ]]; then
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version

      - name: Run CodexMeterCore tests
        run: |
          set -euo pipefail
          swift test --package-path CodexMeterCore

      - name: Build iOS app (Simulator, no signing)
        run: |
          set -euo pipefail
          xcodebuild \
            -project CodexMeter.xcodeproj \
            -scheme CodexMeter \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  watch:
    name: watchOS Simulator build
    runs-on: macos-26
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ios
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode_26.0.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          elif [[ -d /Applications/Xcode.app ]]; then
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version

      - name: Build watch app (Simulator, no signing)
        run: |
          set -euo pipefail
          xcodebuild \
            -project CodexMeter.xcodeproj \
            -target CodexMeterWatch \
            -sdk watchsimulator \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build watch widgets (Simulator, no signing)
        run: |
          set -euo pipefail
          xcodebuild \
            -project CodexMeter.xcodeproj \
            -target CodexMeterWatchWidgets \
            -sdk watchsimulator \
            CODE_SIGNING_ALLOWED=NO \
            build
